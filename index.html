const {useState,useEffect,useRef,useCallback} = React;

const C={bg:"#0d0b08",surface:"#161310",card:"#1c1914",cardH:"#231f19",border:"rgba(180,155,100,0.1)",border2:"rgba(180,155,100,0.18)",t1:"#f0e6d2",t2:"#b5a68d",t3:"#7a6e5c",accent:"#c9a96e",accentDim:"rgba(201,169,110,0.1)",accentMid:"rgba(201,169,110,0.22)"};

async function extractPdfText(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=async(e)=>{
      try{
        if(!window.pdfjsLib){
          await new Promise((res,rej)=>{
            const s=document.createElement("script");
            s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
            s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";res()};
            s.onerror=rej;document.head.appendChild(s);
          });
        }
        const data=new Uint8Array(e.target.result);
        const pdf=await window.pdfjsLib.getDocument({data}).promise;
        let fullText="";
        for(let i=1;i<=pdf.numPages;i++){
          const page=await pdf.getPage(i);
          const content=await page.getTextContent();
          let pageText="",lastY=null;
          content.items.forEach(item=>{
            const y=Math.round(item.transform[5]);
            if(lastY!==null&&Math.abs(y-lastY)>15) pageText+="\n";
            pageText+=item.str+" ";lastY=y;
          });
          fullText+=pageText.trim()+"\n\n";
        }
        resolve(fullText.trim());
      }catch(err){reject(err)}
    };
    reader.onerror=reject;reader.readAsArrayBuffer(file);
  });
}

function cleanAndSplit(rawText){
  let text=rawText.replace(/\r\n/g,"\n").replace(/^\s*\d{1,4}\s*$/gm,"").replace(/^.*[.·…]{4,}.*\d+\s*$/gm,"").replace(/^[\s.·…\d]+$/gm,"").replace(/\n{3,}/g,"\n\n").replace(/ {2,}/g," ");
  let paragraphs=text.split(/\n\s*\n/).map(p=>p.replace(/\n/g," ").trim()).filter(p=>{
    if(p.length<40) return false;
    if(/^(PART|Chapter|CHAPTER|Table of Contents|Contents)/i.test(p)&&p.length<80) return false;
    const ar=(p.match(/[a-zA-ZăîâșțĂÎÂȘȚéèêëàâùûôîïæœçÉÈ]/g)||[]).length/p.length;
    if(ar<0.4) return false; return true;
  });
  if(paragraphs.length<3){
    const sentences=text.split(/(?<=[.!?…])\s+/).filter(s=>s.trim().length>20);
    const fragments=[];let current="",count=0;
    for(const s of sentences){current=current?current+" "+s:s;count++;if(count>=3&&current.length>150){fragments.push(current.trim());current="";count=0;}}
    if(current.trim()&&current.length>40) fragments.push(current.trim());
    return fragments;
  }
  const result=[];let buffer="";
  for(const p of paragraphs){
    if(buffer&&(buffer+" "+p).length<180){buffer+=" "+p}else{
      if(buffer&&buffer.length>=40) result.push(buffer);
      if(p.length>700){const sents=p.split(/(?<=[.!?…])\s+/);let chunk="";for(const s of sents){if(chunk&&(chunk+" "+s).length>450){if(chunk.length>=40)result.push(chunk.trim());chunk=s}else{chunk=chunk?chunk+" "+s:s}}buffer=chunk}
      else{buffer=p}
    }
  }
  if(buffer&&buffer.length>=40) result.push(buffer);
  return result;
}

const DEMO={title:"Meditații",author:"Marcus Aurelius",fragments:[
"De la bunicul meu Verus am învățat bunul caracter și stăpânirea mâniei. Am învățat că adevărata putere nu stă în dominarea altora, ci în dominarea propriilor impulsuri. Aceasta a fost prima lecție care mi-a rămas în suflet.",
"Când te trezești dimineața, gândește-te ce privilegiu prețios este să fii viu — să respiri, să gândești, să te bucuri, să iubești. Niciun mort nu poate face asta. Fiecare dimineață este un dar pe care nu-l meritam.",
"Tot ceea ce auzim este o opinie, nu un fapt. Tot ceea ce vedem este o perspectivă, nu adevărul. Adu-ți aminte de asta în fiecare clipă în care ești tentat să judeci pe cineva.",
"Cel mai bun mod de a te răzbuna pe un dușman este să nu fii ca el. Nu te cobori la nivelul lui, ci ridică-te deasupra. Aceasta este singura victorie adevărată.",
"Privește înăuntrul tău. Înăuntru se află fântâna binelui, și ea va țâșni mereu dacă vei săpa mereu. Nu căuta afară ceea ce poți găsi înăuntru.",
"Nu este că avem puțin timp, ci că pierdem mult din el. Viața este lungă dacă știi cum s-o folosești. Cei mai mulți oameni pierd timpul pe lucruri care nu contează.",
"Fericirea vieții tale depinde de calitatea gândurilor tale. Păzește-ți mintea cu mai multă grijă decât îți păzești averea.",
"Acceptă lucrurile la care soarta te leagă și iubește oamenii cu care soarta te aduce împreună, și fă asta din toată inima.",
"Foarte curând vei fi uitat de toți. La fel și cei care te-au cunoscut. Folosește acest gând nu pentru tristețe, ci pentru libertate.",
"Dimineața, când nu vrei să te trezești, spune-ți: mă trezesc pentru a face treaba unui om. De ce m-aș plânge dacă fac ceea ce m-am născut să fac?",
"Nu pierde timp discutând ce ar trebui să fie un om bun. Fii unul. Acțiunile vorbesc mai tare decât orice filosofie.",
"Obstacolul devine calea. Ceea ce stă în drum devine drumul. Impedimentul acțiunii avansează acțiunea.",
"Alege să nu fii rănit — și nu vei fi rănit. Percepția ta este realitatea ta. Schimbă percepția și schimbi totul.",
"Universul este schimbare; viața noastră este ceea ce gândurile noastre o fac să fie.",
"Arta de a trăi este mai aproape de arta luptătorului decât de cea a dansatorului. Trebuie să fii pregătit și ferm pe picioare.",
]};

function App(){
  const[screen,setScreen]=useState("library");
  const[books,setBooks]=useState([{...DEMO,id:"demo",readIndex:0}]);
  const[activeBookId,setActiveBookId]=useState(null);
  const[importing,setImporting]=useState(false);
  const[importError,setImportError]=useState("");
  const[importText,setImportText]=useState("");
  const[importTitle,setImportTitle]=useState("");
  const[importAuthor,setImportAuthor]=useState("");
  const[importStep,setImportStep]=useState(0);

  useEffect(()=>{try{const s=localStorage.getItem("bf_v4");if(s){const p=JSON.parse(s);if(p.length)setBooks(p)}}catch{}},[]);
  useEffect(()=>{try{localStorage.setItem("bf_v4",JSON.stringify(books))}catch{}},[books]);

  const activeBook=books.find(b=>b.id===activeBookId);
  const updateRead=useCallback((id,idx)=>{setBooks(p=>p.map(b=>b.id===id?{...b,readIndex:Math.max(b.readIndex,idx)}:b))},[]);

  const handlePdf=useCallback(async(file)=>{
    setImporting(true);setImportError("");
    try{
      const text=await extractPdfText(file);
      if(!text||text.trim().length<50){setImportError("PDF-ul pare gol sau scanat.");setImporting(false);return;}
      setImportText(text);setImportTitle(file.name.replace(/\.pdf$/i,"").replace(/[_-]/g," "));setImportStep(2);
    }catch{setImportError("Eroare la citirea PDF-ului.")}
    setImporting(false);
  },[]);

  const finishImport=()=>{
    if(!importText.trim()||!importTitle.trim()) return;
    const frags=cleanAndSplit(importText);
    if(!frags.length){setImportError("Nu am găsit text valid.");return;}
    const nb={id:"b_"+Date.now(),title:importTitle.trim(),author:importAuthor.trim()||"Necunoscut",fragments:frags,readIndex:0};
    setBooks(p=>[...p,nb]);resetImport();setActiveBookId(nb.id);setScreen("reading");
  };
  const resetImport=()=>{setImportText("");setImportTitle("");setImportAuthor("");setImportStep(0);setImportError("")};
  const deleteBook=(id)=>{setBooks(p=>p.filter(b=>b.id!==id));if(activeBookId===id){setActiveBookId(null);setScreen("library")}};

  const root={background:C.bg,color:C.t1,height:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",position:"relative",overflow:"hidden",fontFamily:"'Source Sans 3',-apple-system,sans-serif"};

  return(
    <div style={root}>
      {screen==="library"&&<Library books={books} onSelect={id=>{setActiveBookId(id);setScreen("reading")}} onDelete={deleteBook} onAdd={()=>{resetImport();setScreen("import")}}/>}
      {screen==="import"&&<ImportScreen step={importStep} setStep={setImportStep} text={importText} setText={setImportText} title={importTitle} setTitle={setImportTitle} author={importAuthor} setAuthor={setImportAuthor} loading={importing} error={importError} onPdf={handlePdf} onBack={()=>{resetImport();setScreen("library")}} onDone={finishImport}/>}
      {screen==="reading"&&activeBook&&<ReaderScreen book={activeBook} onBack={()=>setScreen("library")} onUpdate={updateRead}/>}
    </div>
  );
}

function Library({books,onSelect,onDelete,onAdd}){
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:C.bg}}>
      <div style={{padding:"24px 20px 20px",background:C.bg}}>
        <div style={{fontFamily:"'Lora',serif",fontSize:28,fontWeight:700,color:C.t1}}>Book<span style={{color:C.accent}}>Feed</span></div>
        <div style={{fontSize:14,color:C.t3,marginTop:4}}>Citește. Scrollează. Repetă.</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 120px",background:C.bg}}>
        {books.length===0&&<div style={{textAlign:"center",padding:"80px 24px",color:C.t3}}><div style={{fontSize:48,marginBottom:12,opacity:.4}}>📖</div><p style={{fontSize:15,lineHeight:1.6}}>Nicio carte încă.<br/>Apasă + pentru a importa un PDF.</p></div>}
        {books.map(book=>{
          const pct=book.readIndex===0?0:Math.round(((book.readIndex+1)/book.fragments.length)*100);
          return(
            <div key={book.id} onClick={()=>onSelect(book.id)} style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:18,marginBottom:14,cursor:"pointer",position:"relative"}}>
              <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                <div style={{width:50,height:68,borderRadius:10,flexShrink:0,background:"linear-gradient(145deg,"+C.accentDim+","+C.accentMid+")",border:"1px solid "+C.border2,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Lora',serif",fontWeight:700,fontSize:17,color:C.accent}}>{book.title.slice(0,2).toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'Lora',serif",fontWeight:600,fontSize:18,color:C.t1,lineHeight:1.3}}>{book.title}</div>
                  <div style={{fontSize:14,color:C.t2,marginTop:3}}>{book.author}</div>
                  <div style={{fontSize:13,color:C.t3,marginTop:8,display:"flex",gap:12}}><span>{book.fragments.length} fragmente</span><span>{pct===0?"Nou":pct+"%"}</span></div>
                </div>
              </div>
              {pct>0&&<div style={{marginTop:14,height:3,borderRadius:3,background:C.accentDim,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,background:C.accent,width:pct+"%",transition:"width .5s ease"}}/></div>}
              <div style={{marginTop:12,fontSize:14,color:C.accent,fontWeight:600}}>{pct===0?"Începe lectura →":"Continuă →"}</div>
              {book.id!=="demo"&&<button onClick={e=>{e.stopPropagation();onDelete(book.id)}} style={{position:"absolute",top:14,right:14,width:30,height:30,borderRadius:"50%",border:"none",background:"transparent",color:C.t3,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>✕</button>}
            </div>
          );
        })}
      </div>
      <button onClick={onAdd} style={{position:"absolute",bottom:28,right:20,width:58,height:58,borderRadius:"50%",background:C.accent,color:C.bg,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 24px rgba(201,169,110,0.35)",zIndex:10}}>
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  );
}

function ImportScreen({step,setStep,text,setText,title,setTitle,author,setAuthor,loading,error,onPdf,onBack,onDone}){
  const fileRef=useRef(null);
  const frags=text.trim()?cleanAndSplit(text):[];
  const handleFile=async(e)=>{const f=e.target.files?.[0];if(f) await onPdf(f)};

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",background:C.bg}}>
      <div style={{display:"flex",alignItems:"center",padding:"14px 16px",gap:12,borderBottom:"1px solid "+C.border,background:C.bg}}>
        <button style={{width:38,height:38,borderRadius:"50%",border:"none",background:"transparent",color:C.t1,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}} onClick={step<=1?onBack:()=>setStep(0)}>←</button>
        <span style={{flex:1,textAlign:"center",fontSize:13,color:C.t3}}>{step===0?"Importă":step===1?"1 / 2":"2 / 2"}</span>
        {step===2?<button style={{padding:"8px 20px",borderRadius:50,border:"none",background:C.accent,color:C.bg,fontWeight:700,fontSize:14,cursor:"pointer"}} onClick={onDone} disabled={!title.trim()}>Gata</button>:<div style={{width:60}}/>}
      </div>
      <div style={{flex:1,padding:"24px 20px",overflowY:"auto",background:C.bg}}>
        {loading?(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"60px 20px",gap:16,color:C.t2}}>
            <div style={{width:32,height:32,border:"3px solid "+C.border2,borderTopColor:C.accent,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
            <span>Se citește PDF-ul...</span>
          </div>
        ):step===0?(
          <>
            <div style={{fontFamily:"'Lora',serif",fontSize:24,fontWeight:700,color:C.t1}}>Adaugă o carte</div>
            <div style={{color:C.t3,fontSize:14,marginTop:8}}>Alege metoda de import.</div>
            {error&&<div style={{marginTop:16,padding:14,borderRadius:12,background:"rgba(180,60,60,0.12)",border:"1px solid rgba(180,60,60,0.2)",color:"#d4836b",fontSize:14}}>{error}</div>}
            <div style={{marginTop:24,display:"flex",flexDirection:"column",gap:12}}>
              <div onClick={()=>fileRef.current?.click()} style={{padding:20,borderRadius:16,border:"1px solid "+C.border,background:C.card,cursor:"pointer",display:"flex",alignItems:"center",gap:16}}>
                <div style={{width:48,height:48,borderRadius:12,background:C.accentDim,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={C.accent} strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
                </div>
                <div><div style={{fontWeight:700,fontSize:16,color:C.t1}}>Încarcă PDF</div><div style={{fontSize:13,color:C.t3,marginTop:2}}>Selectează un fișier PDF</div></div>
              </div>
              <div onClick={()=>setStep(1)} style={{padding:20,borderRadius:16,border:"1px solid "+C.border,background:C.card,cursor:"pointer",display:"flex",alignItems:"center",gap:16}}>
                <div style={{width:48,height:48,borderRadius:12,background:C.accentDim,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={C.accent} strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </div>
                <div><div style={{fontWeight:700,fontSize:16,color:C.t1}}>Lipește textul</div><div style={{fontSize:13,color:C.t3,marginTop:2}}>Copy-paste din orice sursă</div></div>
              </div>
            </div>
            <input ref={fileRef} type="file" accept=".pdf" style={{display:"none"}} onChange={handleFile}/>
          </>
        ):step===1?(
          <>
            <div style={{fontFamily:"'Lora',serif",fontSize:24,fontWeight:700,color:C.t1}}>Lipește textul</div>
            <textarea style={{width:"100%",height:"45vh",marginTop:16,padding:16,border:"1px solid "+C.border,borderRadius:14,background:C.surface,color:C.t1,fontFamily:"'Lora',serif",fontSize:16,lineHeight:1.65,outline:"none",resize:"none"}} placeholder="Lipește textul cărții aici..." value={text} onChange={e=>setText(e.target.value)} autoFocus/>
            {frags.length>0&&<div style={{marginTop:10,fontSize:13,color:C.accent,fontWeight:500}}>{frags.length} fragmente</div>}
            <button style={{marginTop:20,width:"100%",padding:15,borderRadius:50,border:"none",background:C.accent,color:C.bg,fontSize:16,fontWeight:700,cursor:"pointer",opacity:text.trim()?1:.3}} onClick={()=>{if(text.trim())setStep(2)}} disabled={!text.trim()}>Continuă →</button>
          </>
        ):(
          <>
            <div style={{fontFamily:"'Lora',serif",fontSize:24,fontWeight:700,color:C.t1}}>Detalii carte</div>
            <input style={{width:"100%",padding:15,marginTop:14,border:"1px solid "+C.border,borderRadius:14,background:C.surface,color:C.t1,fontSize:16,outline:"none"}} placeholder="Titlul cărții" value={title} onChange={e=>setTitle(e.target.value)} autoFocus/>
            <input style={{width:"100%",padding:15,marginTop:14,border:"1px solid "+C.border,borderRadius:14,background:C.surface,color:C.t1,fontSize:16,outline:"none"}} placeholder="Autorul (opțional)" value={author} onChange={e=>setAuthor(e.target.value)}/>
            {frags.length>0&&<><div style={{marginTop:16,fontSize:13,color:C.t3}}>{frags.length} fragmente create</div><div style={{marginTop:12,padding:16,borderRadius:14,background:C.accentDim,border:"1px solid rgba(201,169,110,0.08)"}}><div style={{fontSize:11,color:C.accent,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Primul fragment</div><div style={{fontFamily:"'Lora',serif",fontSize:15,color:C.t1,lineHeight:1.55,fontStyle:"italic"}}>{frags[0]}</div></div></>}
            <button style={{marginTop:12,padding:8,border:"none",background:"none",color:C.t3,fontSize:14,cursor:"pointer",width:"100%"}} onClick={()=>setStep(0)}>← Schimbă sursa</button>
          </>
        )}
      </div>
    </div>
  );
}

function ReaderScreen({book,onBack,onUpdate}){
  const[maxSeen,setMaxSeen]=useState(book.readIndex);
  const fragRefs=useRef([]);
  const feedRef=useRef(null);
  const progress=Math.round(((maxSeen+1)/book.fragments.length)*100);

  useEffect(()=>{
    if(book.readIndex>0&&fragRefs.current[book.readIndex]){
      setTimeout(()=>{fragRefs.current[book.readIndex]?.scrollIntoView({behavior:"auto",block:"start"})},100);
    }
  },[]);

  useEffect(()=>{
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          entry.target.style.opacity="1";entry.target.style.transform="translateY(0)";
          const idx=parseInt(entry.target.dataset.idx,10);
          if(!isNaN(idx)) setMaxSeen(prev=>{const next=Math.max(prev,idx);if(next>prev)onUpdate(book.id,next);return next});
        }
      });
    },{threshold:0.3});
    fragRefs.current.forEach(el=>{if(el)obs.observe(el)});
    return()=>obs.disconnect();
  },[book.id,book.fragments.length]);

  const finished=maxSeen>=book.fragments.length-1;

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:C.bg}}>
      <div style={{display:"flex",alignItems:"center",padding:"12px 16px",gap:10,background:C.bg,borderBottom:"1px solid "+C.border}}>
        <button onClick={onBack} style={{width:38,height:38,borderRadius:"50%",border:"none",background:"transparent",color:C.t2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>←</button>
        <div style={{flex:1,textAlign:"center",minWidth:0}}>
          <div style={{fontFamily:"'Lora',serif",fontWeight:600,fontSize:15,color:C.t1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{book.title}</div>
          <div style={{fontSize:12,color:C.t3}}>{book.author}</div>
        </div>
        <div style={{fontSize:13,color:C.accent,fontWeight:600,width:38,textAlign:"right",flexShrink:0}}>{progress}%</div>
      </div>
      <div style={{height:2,background:C.accentDim,margin:"0 16px"}}><div style={{height:"100%",background:C.accent,borderRadius:2,width:progress+"%",transition:"width .6s cubic-bezier(.4,0,.2,1)"}}/></div>
      <div ref={feedRef} style={{flex:1,overflowY:"auto",padding:"0 0 140px",overscrollBehavior:"contain",background:C.bg}}>
        {book.fragments.map((frag,i)=>(
          <div key={i} data-idx={i} ref={el=>fragRefs.current[i]=el} style={{padding:"28px 24px",borderBottom:"1px solid "+C.border,opacity:i<=book.readIndex?1:0,transform:i<=book.readIndex?"translateY(0)":"translateY(8px)",transition:"opacity .4s ease, transform .4s ease",background:C.bg}}>
            <div style={{fontFamily:"'Lora',serif",fontSize:19,lineHeight:1.75,color:C.t1,letterSpacing:"0.01em"}}>{frag}</div>
            <div style={{marginTop:14,fontSize:12,color:C.t3}}>{(i+1)+" / "+book.fragments.length}</div>
          </div>
        ))}
        {finished?(
          <div style={{padding:"48px 24px",textAlign:"center",background:C.bg}}>
            <div style={{width:60,height:60,borderRadius:"50%",background:C.accentDim,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke={C.accent} strokeWidth="2.5"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <div style={{fontFamily:"'Lora',serif",fontSize:24,fontWeight:700,color:C.t1}}>Carte terminată!</div>
            <div style={{color:C.t3,fontSize:14,marginTop:8}}>{book.fragments.length} fragmente citite</div>
            <button onClick={onBack} style={{marginTop:24,padding:"14px 32px",borderRadius:50,border:"none",background:C.accent,color:C.bg,fontWeight:700,fontSize:15,cursor:"pointer"}}>← Bibliotecă</button>
          </div>
        ):(
          <div style={{textAlign:"center",padding:"36px 20px 16px",color:C.t3,fontSize:13,animation:"pulse 2s ease-in-out infinite",background:C.bg}}>↓ continuă ↓</div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
